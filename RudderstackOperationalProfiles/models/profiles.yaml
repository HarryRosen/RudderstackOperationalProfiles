# profiles.yaml
# Updated configuration with deterministic feature selection using primary_customerid
# UPDATED: Added address fields from sysdba.address table

models:
  - name: user_id_stitcher
    model_type: id_stitcher
    model_spec:
      entity_key: user
      edge_sources:
        - from: inputs/rsIdentifies
        - from: inputs/rsTracks
        - from: inputs/rsProductViewed        
        - from: inputs/rsProductAddedToWishlist  
        - from: inputs/contact
        - from: inputs/name_phone_matches
        - from: inputs/contact_retail 

var_groups:
  - name: user_features
    entity_key: user
    vars:
      # FIXED: Contact information features - now using primary contact only
      
      - entity_var:
          name: account_creation_date
          select: any_value(createdate)
          from: models/contact_primary_filtered
          where: createdate IS NOT NULL
          description: Date the primary contact record was first created

      - entity_var:
          name: mobile_phone
          select: any_value(mobile)
          from: models/contact_primary_filtered
          where: mobile is not null and mobile != ''
          description: Mobile Phone Number from primary customer

      - entity_var:
          name: homephone
          select: any_value(homephone)
          from: models/contact_primary_filtered
          where: homephone is not null and homephone != ''
          description: Home phone number from primary customer

      - entity_var:
          name: prefix
          select: any_value(prefix)
          from: models/contact_primary_filtered
          where: prefix is not null and prefix != ''
          description: Prefix from primary customer

      - entity_var:
          name: firstname
          select: any_value(firstname)
          from: models/contact_primary_filtered
          where: firstname is not null and firstname != ''
          description: First name from primary customer

      - entity_var:
          name: lastname
          select: any_value(lastname)
          from: models/contact_primary_filtered
          where: lastname is not null and lastname != ''
          description: Last name from primary customer

      # FIXED: Contact retail profile features - now using primary contact only
      - entity_var:
          name: loginradius_id
          select: any_value(identityid)
          from: models/contact_retail_primary_filtered
          where: identityid is not null
          description: Login Radius ID from primary customer
      
      - entity_var:
          name: language_preference
          select: any_value(languagepref)
          from: models/language_preference_filled
          where: languagepref is not null and languagepref != ''
          description: Profile language (contact-retail value when present, else "en" default)
      
      # FIXED: Transaction aggregation features - now deterministic from primary
      
      - entity_var:
          name: last_transaction_date
          select: any_value(last_transaction_date)
          from: models/contact_retail_primary_filtered
          where: last_transaction_date is not null
          description: Last transaction date from primary customer

      # NEW: Address features from primary customer
      - entity_var:
          name: address
          select: any_value(address)
          from: models/address_primary_filtered
          where: address is not null and address != ''
          description: Primary address from customer's primary address record

      - entity_var:
          name: city
          select: any_value(city)
          from: models/address_primary_filtered
          where: city is not null and city != ''
          description: City from customer's primary address record

      - entity_var:
          name: province
          select: any_value(province)
          from: models/address_primary_filtered
          where: province is not null and province != ''
          description: Province/State from customer's primary address record

      - entity_var:
          name: postalcode
          select: any_value(postalcode)
          from: models/address_primary_filtered
          where: postalcode is not null and postalcode != ''
          description: Postal code from customer's primary address record

      - entity_var:
          name: country
          select: any_value(country)
          from: models/address_primary_filtered
          where: country is not null and country != ''
          description: Country from customer's primary address record
      
      # Contact aggregation features (these can remain as-is for counts)
      - entity_var:
          name: contact_count
          select: count(distinct contactid)
          from: inputs/contact
          description: Number of contact records stitched to this profile
      
      - entity_var:
          name: customer_ids_list
          select: array_agg(distinct customerid)
          from: inputs/contact_retail
          where: customerid is not null
          description: List of customer IDs associated with profile
      
      - entity_var:
          name: contact_ids_list
          select: array_agg(distinct contactid)
          from: inputs/contact
          description: List of contact IDs stitched to this profile
      
      # Name phone match features
      - entity_var:
          name: name_phone_keys
          select: array_agg(distinct name_phone_key)
          from: inputs/name_phone_matches
          where: name_phone_key is not null
          description: List of name phone keys associated with profile

      # Primary customer identification features
      - entity_var:
          name: mainline_customerid
          select: any_value(mainline_customerid)
          from: models/contact_with_retail
          where: mainline_customerid is not null
          description: Mainline customer ID

      - entity_var:
          name: outlet_customerid
          select: any_value(outlet_customerid)
          from: models/contact_with_retail
          where: outlet_customerid is not null
          description: Outlet customer ID

      - entity_var:
          name: primary_customerid
          select: any_value(primary_customerid)
          from: models/contact_with_retail
          description: Primary customer ID (most transacted)

      # Brand affinity features (unchanged)
      - entity_var:
          name: brand_affinity_purchased
          select: any_value(brand_affinity_purchased)
          from: models/customer_brand_affinity
          where: brand_affinity_purchased is not null
          description: Top 10 brands purchased by user based on last 3 years of transaction data

      - entity_var:
          name: category_affinity_purchased
          select: any_value(category_affinity_purchased)
          from: models/customer_category_affinity
          where: category_affinity_purchased is not null
          description: Top 10 categories purchased by user based on last 3 years of transaction data

      # Brand affinity feature - INTERESTED (browsing-based)
      - entity_var:
          name: brand_affinity_interested
          select: any_value(brand_affinity_interested)
          from: models/customer_brand_affinity_interested
          where: brand_affinity_interested is not null
          description: Top 10 brands browsed by user based on product views and wishlist adds

      # Category affinity feature - INTERESTED (browsing-based)  
      - entity_var:
          name: category_affinity_interested
          select: any_value(category_affinity_interested)
          from: models/customer_category_affinity_interested
          where: category_affinity_interested is not null
          description: Top 10 categories browsed by user based on product views and wishlist adds

      # Mainline Sales Features
      - entity_var:
          name: mainline_lasttrans
          select: any_value(lasttrans)
          from: models/mainline_sales
          where: lasttrans is not null
          description: Last transaction date for mainline business

      - entity_var:
          name: mainline_laststoretrans
          select: any_value(laststoretrans)
          from: models/mainline_sales
          where: laststoretrans is not null
          description: Last store transaction date for mainline business

      - entity_var:
          name: mainline_lastonlinetrans
          select: any_value(lastonlinetrans)
          from: models/mainline_sales
          where: lastonlinetrans is not null
          description: Last online transaction date for mainline business

      - entity_var:
          name: mainline_firsttransactiondate
          select: any_value(firsttransactiondate)
          from: models/mainline_sales
          where: firsttransactiondate is not null
          description: First transaction date for mainline business

      - entity_var:
          name: mainline_total_sales
          select: any_value(lifetime_sales)
          from: models/mainline_sales
          where: lifetime_sales is not null
          description: Total lifetime sales for mainline business

      - entity_var:
          name: mainline_sevenyearsales
          select: any_value(sevenyearsales)
          from: models/mainline_sales
          where: sevenyearsales is not null
          description: Seven year sales for mainline business

      - entity_var:
          name: mainline_threeyearsales
          select: any_value(threeyearsales)
          from: models/mainline_sales
          where: threeyearsales is not null
          description: Three year sales for mainline business

      - entity_var:
          name: mainline_oneyearsales
          select: any_value(oneyearsales)
          from: models/mainline_sales
          where: oneyearsales is not null
          description: One year sales for mainline business

      - entity_var:
          name: mainline_sales_ytd
          select: any_value(sales_ytd)
          from: models/mainline_sales
          where: sales_ytd is not null
          description: Year-to-date sales for mainline business

      # Finalcut Sales Features
      - entity_var:
          name: finalcut_lasttrans
          select: any_value(lasttrans)
          from: models/finalcut_sales
          where: lasttrans is not null
          description: Last transaction date for finalcut business

      - entity_var:
          name: finalcut_laststoretrans
          select: any_value(laststoretrans)
          from: models/finalcut_sales
          where: laststoretrans is not null
          description: Last store transaction date for finalcut business

      - entity_var:
          name: finalcut_lastonlinetrans
          select: any_value(lastonlinetrans)
          from: models/finalcut_sales
          where: lastonlinetrans is not null
          description: Last online transaction date for finalcut business

      - entity_var:
          name: finalcut_firsttransactiondate
          select: any_value(firsttransactiondate)
          from: models/finalcut_sales
          where: firsttransactiondate is not null
          description: First transaction date for finalcut business

      - entity_var:
          name: finalcut_total_sales
          select: any_value(lifetime_sales)
          from: models/finalcut_sales
          where: lifetime_sales is not null
          description: Total lifetime sales for finalcut business

      - entity_var:
          name: finalcut_sevenyearsales
          select: any_value(sevenyearsales)
          from: models/finalcut_sales
          where: sevenyearsales is not null
          description: Seven year sales for finalcut business

      - entity_var:
          name: finalcut_threeyearsales
          select: any_value(threeyearsales)
          from: models/finalcut_sales
          where: threeyearsales is not null
          description: Three year sales for finalcut business

      - entity_var:
          name: finalcut_oneyearsales
          select: any_value(oneyearsales)
          from: models/finalcut_sales
          where: oneyearsales is not null
          description: One year sales for finalcut business

      - entity_var:
         name: finalcut_sales_ytd
         select: any_value(sales_ytd)
         from: models/finalcut_sales
         where: sales_ytd is not null
         description: Year-to-date sales for final cut business

      # Outlet Sales Features
      - entity_var:
          name: outlet_lasttrans
          select: any_value(lasttrans)
          from: models/outlet_sales
          where: lasttrans is not null
          description: Last transaction date for outlet business

      - entity_var:
          name: outlet_laststoretrans
          select: any_value(laststoretrans)
          from: models/outlet_sales
          where: laststoretrans is not null
          description: Last store transaction date for outlet business

      - entity_var:
          name: outlet_lastonlinetrans
          select: any_value(lastonlinetrans)
          from: models/outlet_sales
          where: lastonlinetrans is not null
          description: Last online transaction date for outlet business

      - entity_var:
          name: outlet_firsttransactiondate
          select: any_value(firsttransactiondate)
          from: models/outlet_sales
          where: firsttransactiondate is not null
          description: First transaction date for outlet business

      - entity_var:
          name: outlet_total_sales
          select: any_value(lifetime_sales)
          from: models/outlet_sales
          where: lifetime_sales is not null
          description: Total lifetime sales for outlet business

      - entity_var:
          name: outlet_sevenyearsales
          select: any_value(sevenyearsales)
          from: models/outlet_sales
          where: sevenyearsales is not null
          description: Seven year sales for outlet business

      - entity_var:
          name: outlet_threeyearsales
          select: any_value(threeyearsales)
          from: models/outlet_sales
          where: threeyearsales is not null
          description: Three year sales for outlet business

      - entity_var:
          name: outlet_oneyearsales
          select: any_value(oneyearsales)
          from: models/outlet_sales
          where: oneyearsales is not null
          description: One year sales for outlet business

      - entity_var:
          name: outlet_sales_ytd
          select: any_value(sales_ytd)
          from: models/outlet_sales
          where: sales_ytd is not null
          description: Year-to-date sales for outlet business

      # Combined sales features (all business lines)
      - entity_var:
          name: last_trans
          select: any_value(last_trans)
          from: models/combined_sales
          where: last_trans is not null
          description: Last transaction date across all business lines
      
      - entity_var:
          name: last_store_trans
          select: any_value(last_store_trans)
          from: models/combined_sales
          where: last_store_trans is not null
          description: Last store transaction date across all business lines
      
      - entity_var:
          name: last_online_trans
          select: any_value(last_online_trans)
          from: models/combined_sales
          where: last_online_trans is not null
          description: Last online transaction date across all business lines
      
      - entity_var:
          name: first_transaction_date_combined
          select: any_value(first_transaction_date)
          from: models/combined_sales
          where: first_transaction_date is not null
          description: First transaction date across all business lines

      - entity_var:
          name: total_sales
          select: any_value(lifetime_sales)
          from: models/combined_sales
          where: lifetime_sales is not null
          description: Total sales amount across all business lines

      - entity_var:
          name: total_sales_ytd
          select: any_value(sales_ytd)
          from: models/combined_sales
          where: sales_ytd is not null
          description: Year-to-date total sales across all business lines

      - entity_var:
          name: seven_year_sales
          select: any_value(seven_year_sales)
          from: models/combined_sales
          where: seven_year_sales is not null
          description: Sales amount in last 7 years across all business lines
      
      - entity_var:
          name: three_year_sales
          select: any_value(three_year_sales)
          from: models/combined_sales
          where: three_year_sales is not null
          description: Sales amount in last 3 years across all business lines
      
      - entity_var:
          name: one_year_sales
          select: any_value(one_year_sales)
          from: models/combined_sales
          where: one_year_sales is not null
          description: Sales amount in last 1 year across all business lines

      # NEW: Demographic segmentation features from primary customer
      - entity_var:
          name: prizm_seg
          select: any_value(prizm_seg)
          from: models/demographic_primary_filtered
          where: prizm_seg is not null and prizm_seg != ''
          description: PRIZM segment code from customer's demographic profile
      
      - entity_var:
          name: prizm_seg_name
          select: any_value(prizm_seg_name)
          from: models/demographic_primary_filtered
          where: prizm_seg_name is not null and prizm_seg_name != ''
          description: PRIZM segment name from customer's demographic profile
      
      - entity_var:
          name: target_segment
          select: any_value(target_segment)
          from: models/demographic_primary_filtered
          where: target_segment is not null and target_segment != ''
          description: Target segment code from customer's demographic profile
      
      - entity_var:
          name: target_segment_name
          select: any_value(target_segment_name)
          from: models/demographic_primary_filtered
          where: target_segment_name is not null and target_segment_name != ''
          description: Target segment name from customer's demographic profile


      # NEW: Mainline advisor features from mainline customer
      - entity_var:
          name: mainline_advisor_firstname
          select: any_value(advisor_firstname)
          from: models/advisor_mainline_filtered
          where: advisor_firstname is not null and advisor_firstname != ''
          description: First name of account manager/advisor for mainline business

      - entity_var:
          name: mainline_advisor_lastname
          select: any_value(advisor_lastname)
          from: models/advisor_mainline_filtered
          where: advisor_lastname is not null and advisor_lastname != ''
          description: Last name of account manager/advisor for mainline business

      - entity_var:
          name: mainline_advisor_email
          select: any_value(advisor_email)
          from: models/advisor_mainline_filtered
          where: advisor_email is not null and advisor_email != ''
          description: Email address of account manager/advisor for mainline business

      - entity_var:
          name: mainline_advisor_id
          select: any_value(advisor_id)
          from: models/advisor_mainline_filtered
          where: advisor_id is not null
          description: User ID of account manager/advisor for mainline business

      - entity_var:
          name: mainline_storecode
          select: any_value(storecode)
          from: models/advisor_mainline_filtered
          where: storecode is not null and storecode != ''
          description: Store code associated with mainline customer

      - entity_var:
          name: mainline_previous_advisor_id
          select: any_value(previous_advisor_id)
          from: models/advisor_mainline_filtered
          where: previous_advisor_id is not null
          description: Previous account manager ID for mainline business

      # NEW: Outlet advisor features from outlet customer
      - entity_var:
          name: outlet_advisor_firstname
          select: any_value(advisor_firstname)
          from: models/advisor_outlet_filtered
          where: advisor_firstname is not null and advisor_firstname != ''
          description: First name of account manager/advisor for outlet business

      - entity_var:
          name: outlet_advisor_lastname
          select: any_value(advisor_lastname)
          from: models/advisor_outlet_filtered
          where: advisor_lastname is not null and advisor_lastname != ''
          description: Last name of account manager/advisor for outlet business

      - entity_var:
          name: outlet_advisor_email
          select: any_value(advisor_email)
          from: models/advisor_outlet_filtered
          where: advisor_email is not null and advisor_email != ''
          description: Email address of account manager/advisor for outlet business

      - entity_var:
          name: outlet_advisor_id
          select: any_value(advisor_id)
          from: models/advisor_outlet_filtered
          where: advisor_id is not null
          description: User ID of account manager/advisor for outlet business

      - entity_var:
          name: outlet_storecode
          select: any_value(storecode)
          from: models/advisor_outlet_filtered
          where: storecode is not null and storecode != ''
          description: Store code associated with outlet customer

      - entity_var:
          name: outlet_previous_advisor_id
          select: any_value(previous_advisor_id)
          from: models/advisor_outlet_filtered
          where: previous_advisor_id is not null
          description: Previous account manager ID for outlet business

      # NEW: Business-line specific affinity features (purchased)
      - entity_var:
          name: mainline_brand_affinity_purchased
          select: any_value(mainline_brand_affinity_purchased)
          from: models/mainline_brand_affinity
          where: mainline_brand_affinity_purchased is not null
          description: Top 10 brands purchased in mainline business (seccode F6UJ9A000002, store != 997)

      - entity_var:
          name: outlet_brand_affinity_purchased
          select: any_value(outlet_brand_affinity_purchased)
          from: models/outlet_brand_affinity
          where: outlet_brand_affinity_purchased is not null
          description: Top 10 brands purchased in outlet business (seccode F6UJ9A000004)

      - entity_var:
          name: finalcut_brand_affinity_purchased
          select: any_value(finalcut_brand_affinity_purchased)
          from: models/finalcut_brand_affinity
          where: finalcut_brand_affinity_purchased is not null
          description: Top 10 brands purchased in final cut business (seccode F6UJ9A000002, store = 997)

      - entity_var:
          name: mainline_category_affinity_purchased
          select: any_value(mainline_category_affinity_purchased)
          from: models/mainline_category_affinity
          where: mainline_category_affinity_purchased is not null
          description: Top 10 categories purchased in mainline business (seccode F6UJ9A000002, store != 997)

      - entity_var:
          name: outlet_category_affinity_purchased
          select: any_value(outlet_category_affinity_purchased)
          from: models/outlet_category_affinity
          where: outlet_category_affinity_purchased is not null
          description: Top 10 categories purchased in outlet business (seccode F6UJ9A000004)

      - entity_var:
          name: finalcut_category_affinity_purchased
          select: any_value(finalcut_category_affinity_purchased)
          from: models/finalcut_category_affinity
          where: finalcut_category_affinity_purchased is not null
          description: Top 10 categories purchased in final cut business (seccode F6UJ9A000002, store = 997)

      # NEW: Business-line specific affinity features (browsing interest)
      - entity_var:
          name: mainline_brand_affinity_interested
          select: any_value(mainline_brand_affinity_interested)
          from: models/mainline_brand_affinity_interested_model
          where: mainline_brand_affinity_interested is not null
          description: Top 10 brands browsed on mainline store (store_id = 990)

      - entity_var:
          name: finalcut_brand_affinity_interested
          select: any_value(finalcut_brand_affinity_interested)
          from: models/finalcut_brand_affinity_interested_model
          where: finalcut_brand_affinity_interested is not null
          description: Top 10 brands browsed on final cut store (store_id = 997)

      - entity_var:
          name: mainline_category_affinity_interested
          select: any_value(mainline_category_affinity_interested)
          from: models/mainline_category_affinity_interested_model
          where: mainline_category_affinity_interested is not null
          description: Top 10 categories browsed on mainline store (store_id = 990)

      - entity_var:
          name: finalcut_category_affinity_interested
          select: any_value(finalcut_category_affinity_interested)
          from: models/finalcut_category_affinity_interested_model
          where: finalcut_category_affinity_interested is not null
          description: Top 10 categories browsed on final cut store (store_id = 997)

      # NEW: Customer AXR (Acquisition/Expansion/Retention) features from primary customer
      - entity_var:
          name: last_pur_visit_seq
          select: any_value(last_pur_visit_seq)
          from: models/customer_axr_status
          where: last_pur_visit_seq is not null
          description: Last purchase visit sequence number from customer's AXR profile (primary customer)

      - entity_var:
          name: next_axr_status
          select: any_value(next_axr_status)
          from: models/customer_axr_status
          where: next_axr_status is not null and next_axr_status != ''
          description: Customer lifecycle status (acquisition/expansion/retention/reactivation) from AXR analysis (primary customer)


      # NEW ─ Purchase-count features
      - entity_var:
          name: total_purchases
          select: any_value(total_purchases)
          from: models/customer_total_purchases
          where: total_purchases IS NOT NULL
          description: Total lifetime transactions across all business lines
      
      - entity_var:
          name: mainline_total_purchases
          select: any_value(mainline_total_purchases)
          from: models/customer_total_purchases
          where: mainline_total_purchases IS NOT NULL
          description: Lifetime transactions at Mainline (seccode F6UJ9A000002)
      
      - entity_var:
          name: outlet_total_purchases
          select: any_value(outlet_total_purchases)
          from: models/customer_total_purchases
          where: outlet_total_purchases IS NOT NULL
          description: Lifetime transactions at Outlet (seccode F6UJ9A000004)

      - entity_var:
          name: rfm_score
          select: any_value(rfm_score)
          from: models/rfm_score_model
          where: rfm_score IS NOT NULL
          description: Recency Frequency Monetary Score

      - entity_var:
          name: sale_spend_score
          select: any_value(sale_spend_score)
          from: models/sale_spend_score_model
          where: sale_spend_score IS NOT NULL
          description: Recency Frequency Monetary Score
      
      - entity_var:
          name: resolved_email
          select: any_value(resolved_email)
          from: models/email_resolved
          where: resolved_email IS NOT NULL AND resolved_email != ''
          description: Resolved primary email from prioritized (primary sysdba.contact -> fallback sysdba.contact -> rsIdentifies)

      # NEW: HR (Mainline) Lifecycle Stage feature
      - entity_var:
          name: hr_lifecycle_stage
          select: any_value(hr_lifecycle_stage)
          from: models/hr_lifecycle_stage_model
          where: hr_lifecycle_stage is not null and hr_lifecycle_stage != ''
          description: Current lifecycle stage for mainline customer (HR) from Braze lifecycle mapping

      # NEW: HR (Mainline) Lifecycle Stage feature
      - entity_var:
          name: hr_lifecycle_last_change_dt
          select: any_value(cast(hr_lifecycle_last_change_dt as date))
          from: models/hr_lifecycle_stage_model
          where: hr_lifecycle_last_change_dt is not null
          description: Current lifecycle stage for mainline customer (HR) from Braze lifecycle mapping

      # NEW: OL (Outlet) Lifecycle Stage feature
      - entity_var:
          name: ol_lifecycle_stage
          select: any_value(ol_lifecycle_stage)
          from: models/ol_lifecycle_stage_model
          where: ol_lifecycle_stage is not null and ol_lifecycle_stage != ''
          description: Current lifecycle stage for outlet customer (OL) from Braze lifecycle

      # NEW: OL (Outlet) Lifecycle Stage feature
      - entity_var:
          name: ol_lifecycle_last_change_dt
          select: any_value(cast(ol_lifecycle_last_change_dt as date))
          from: models/ol_lifecycle_stage_model
          where: ol_lifecycle_last_change_dt is not null
          description: Current lifecycle stage for outlet customer (OL) from Braze lifecycle

      # NEW: HR (Mainline) AXR features excluding Final Cut transactions
      - entity_var:
          name: hr_last_pur_visit_seq
          select: any_value(hr_last_pur_visit_seq)
          from: models/hr_customer_axr_status
          where: hr_last_pur_visit_seq is not null
          description: Last purchase visit sequence number from mainline customers AXR profile (excluding Final Cut store 997 transactions)
      
      # NEW: Final Cut AXR features (store 997 transactions only)
      - entity_var:
          name: fc_last_pur_visit_seq
          select: any_value(fc_last_pur_visit_seq)
