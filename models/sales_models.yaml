models:
  - name: mainline_sales
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_customer_mapping AS (
          -- Get all customer IDs associated with each stitched user
          SELECT 
            user_main_id,
            other_id AS customerid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'user_id'
        ),
        YearStart AS (
          SELECT MAX(cal.TradingDate) AS CYStart
          FROM custom.Calendar cal
          WHERE date_format(cal.TradingDate, 'MMdd') = '0201'
          AND cal.TradingDate <= current_date()
        ),
        mainline_transactions AS (
          SELECT 
            ucm.user_main_id,
            txn.BusinessDate,
            st.webind,
            txi.Qty * txi.SellingPrice AS sales_amount
          FROM user_customer_mapping ucm
          JOIN vstore.Customer cus ON ucm.customerid = cus.IdentificationNo
          JOIN sysdba.SalesEntity se ON cus.IdentificationNo = se.CustomerID
          JOIN sysdba.contact_retail cr ON se.ContactID = cr.contactid
          JOIN sysdba.contact c ON cr.contactid = c.contactid
          JOIN vstore.Transaction txn ON cus.pkCustomerNo = txn.fkCustomerNo
          JOIN vstore.terminal te ON te.pkterminalid = txn.fkterminalid
          JOIN vstore.store st ON st.pkstoreno = te.fkstoreno
          JOIN vstore.TranItem txi ON txn.pkTransactionId = txi.fkTransactionId
          WHERE txn.fkTranType IN (10)
            AND COALESCE(txn.IsVoided, 'f') = 'f'
            AND COALESCE(txi.IsVoided, 'f') = 'f'
            AND c.seccodeid = 'F6UJ9A000002'
            AND te.fkstoreno != 997
        ),
        with_year_start AS (
          SELECT mt.*, ys.CYStart
          FROM mainline_transactions mt
          CROSS JOIN YearStart ys
        )
        SELECT 
          user_main_id,
          MAX(BusinessDate) AS lasttrans,
          MAX(CASE WHEN webind = 'N' THEN BusinessDate ELSE NULL END) AS laststoretrans,
          MAX(CASE WHEN webind = 'Y' THEN BusinessDate ELSE NULL END) AS lastonlinetrans,
          MIN(BusinessDate) AS firsttransactiondate,
          COALESCE(SUM(sales_amount), 0) / 100 AS lifetime_sales,
          COALESCE(SUM(CASE WHEN BusinessDate >= date_sub(current_date(), 7 * 365) 
                            THEN sales_amount ELSE 0 END), 0) / 100 AS sevenyearsales,
          COALESCE(SUM(CASE WHEN BusinessDate >= date_sub(current_date(), 3 * 365) 
                            THEN sales_amount ELSE 0 END), 0) / 100 AS threeyearsales,
          COALESCE(SUM(CASE WHEN BusinessDate >= date_sub(current_date(), 365) 
                            THEN sales_amount ELSE 0 END), 0) / 100 AS oneyearsales,
          COALESCE(SUM(CASE WHEN BusinessDate >= CYStart THEN sales_amount ELSE 0 END), 0) / 100 AS sales_ytd
        FROM with_year_start
        GROUP BY user_main_id
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

