  # NEW: Demographic data filtered by primary_customerid
  - name: demographic_primary_filtered
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_primary_contact AS (
          SELECT
            cwr.user_main_id,
            cwr.primary_customerid,
            cr.contactid as primary_contactid
          FROM {{ this.DeRef("models/contact_with_retail") }} cwr
          JOIN sysdba.contact_retail cr
            ON cwr.primary_customerid = cr.customerid
        )
        SELECT
          upc.user_main_id,
          d.prizm_seg,
          d.prizm_seg_name,
          d.target_segment,
          nvl(d.TARGET_SEGMENT_NAME, 'Non-Target') as target_segment_name
        FROM user_primary_contact upc
        JOIN tableau_data.gen5y_contact_combined d
          ON upc.primary_contactid = d.contactid
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user


  # NEW: Advisor data for mainline customers (seccode 'F6UJ9A000002')
  - name: advisor_mainline_filtered
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_mainline_contact AS (
          SELECT 
            cwr.user_main_id,
            cwr.mainline_customerid,
            cr.contactid as mainline_contactid
          FROM {{ this.DeRef("models/contact_with_retail") }} cwr
          JOIN sysdba.contact_retail cr 
            ON cwr.mainline_customerid = cr.customerid
          WHERE cwr.mainline_customerid IS NOT NULL
        )
        SELECT 
          umc.user_main_id,
          ui.firstname as advisor_firstname,
          ui.lastname as advisor_lastname,
          ui.email as advisor_email,
          ui.userid as advisor_id,
          cr.storecode,
          cr.previousaccountmanagerid as previous_advisor_id
        FROM user_mainline_contact umc
        JOIN sysdba.contact c ON umc.mainline_contactid = c.contactid
        JOIN sysdba.contact_retail cr ON c.contactid = cr.contactid
        LEFT JOIN sysdba.userinfo ui ON ui.userid = c.accountmanagerid
        WHERE c.seccodeid = 'F6UJ9A000002'
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

