  # NEW: Mainline brand affinity (purchased) - seccode F6UJ9A000002, store != 997
  - name: mainline_brand_affinity
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_customer_mapping AS (
          -- Get all customer IDs associated with each stitched user
          SELECT 
            user_main_id,
            other_id AS customerid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'user_id'
        ),
        brand_counts AS (
          SELECT 
            ucm.user_main_id,
            UPPER(c.brand_name_eng) as brand_name_eng,
            SUM(NVL(ti.qty, 0)) AS purchased_items
          FROM user_customer_mapping ucm
          JOIN vstore.customer cust ON ucm.customerid = cust.identificationno
          JOIN vstore.transaction t ON cust.pkcustomerno = t.fkcustomerno
          JOIN vstore.terminal te ON te.pkterminalid = t.fkterminalid
          JOIN vstore.store st ON st.pkstoreno = te.fkstoreno
          JOIN sysdba.SalesEntity se ON cust.identificationno = se.customerid
          JOIN sysdba.contact_retail cr ON se.contactid = cr.contactid
          JOIN sysdba.contact c2 ON cr.contactid = c2.contactid
          LEFT JOIN vstore.tranitem ti ON ti.fktransactionid = t.pktransactionid
          INNER JOIN vstore.sku s ON s.pksku = ti.fksku
          INNER JOIN elcat.catalog c ON s.fkstyleno = SUBSTR(c.styleid, 1, 8)
          WHERE NVL(ti.qty, 0) > 0 
            AND t.fkTranType IN (10)
            AND COALESCE(t.IsVoided, 'f') = 'f'
            AND t.businessdate > date_sub(current_date(), 365 * 3)
            AND c.brand_name_eng IS NOT NULL
            AND c2.seccodeid = 'F6UJ9A000002'
            AND st.pkstoreno != 997
          GROUP BY ucm.user_main_id, UPPER(c.brand_name_eng)
        ),
        ranked_brands AS (
          SELECT
            user_main_id,
            brand_name_eng,
            purchased_items,
            ROW_NUMBER() OVER (PARTITION BY user_main_id ORDER BY purchased_items DESC) AS rn
          FROM brand_counts
        )
        SELECT 
          user_main_id,
          concat_ws('|', collect_list(brand_name_eng)) AS mainline_brand_affinity_purchased
        FROM ranked_brands
        WHERE rn <= 10
        GROUP BY user_main_id
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

