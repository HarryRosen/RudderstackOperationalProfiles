          FROM user_customer_mapping ucm
          JOIN vstore.customer cust ON ucm.customerid = cust.identificationno
          JOIN vstore.transaction t ON cust.pkcustomerno = t.fkcustomerno
          JOIN vstore.terminal te ON te.pkterminalid = t.fkterminalid
          JOIN vstore.store st ON st.pkstoreno = te.fkstoreno
          JOIN sysdba.SalesEntity se ON cust.identificationno = se.customerid
          JOIN sysdba.contact_retail cr ON se.contactid = cr.contactid
          JOIN sysdba.contact c2 ON cr.contactid = c2.contactid
          LEFT JOIN vstore.tranitem ti ON ti.fktransactionid = t.pktransactionid
          INNER JOIN vstore.sku s ON s.pksku = ti.fksku
