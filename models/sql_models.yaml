  - name: email_resolved
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , primary_email AS (
          SELECT
            user_main_id,
            LOWER(primary_email) AS contact_primary_email
          FROM {{ this.DeRef("models/contact_primary_filtered") }}
          WHERE email IS NOT NULL AND email != ''
        ),
  
        -- Step 2: Get all stitched contact IDs for fallback email lookup
        user_contacts AS (
          SELECT 
            user_main_id,
            other_id AS contactid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'contact_id'
        ),
        
        -- Get primary contact ID to exclude from fallback
        primary_contacts AS (
          SELECT 
            cpf.user_main_id,
            cpf.contactid as primary_contactid
          FROM {{ this.DeRef("models/contact_primary_filtered") }} cpf
        ),
        
        -- Fallback emails from other stitched contacts (excluding primary)
        stitched_contact_emails AS (
          SELECT
            uc.user_main_id,
            LOWER(c.email) AS contact_secondary_email,
            ROW_NUMBER() OVER (PARTITION BY uc.user_main_id ORDER BY c.createdate DESC) as rn
          FROM user_contacts uc
          JOIN sysdba.contact c ON uc.contactid = c.contactid
          LEFT JOIN primary_contacts pc ON uc.user_main_id = pc.user_main_id 
            AND uc.contactid = pc.primary_contactid
          WHERE c.email IS NOT NULL 
            AND c.email != ''
            AND pc.primary_contactid IS NULL  -- Exclude primary contact
        ),
  
        -- Step 3: Fallback email from RudderStack identifies
        stitcher_email AS (
          SELECT
            user_main_id,
            LOWER(other_id) AS stitched_email,
            ROW_NUMBER() OVER (PARTITION BY user_main_id ORDER BY other_id) as rn
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'email'
        )
  
        -- Final prioritized selection
        SELECT DISTINCT
          COALESCE(pe.user_main_id, sce.user_main_id, se.user_main_id) AS user_main_id,
          COALESCE(
            trim(pe.contact_primary_email),
            trim(sce.contact_secondary_email),
            trim(se.stitched_email)
          ) AS resolved_email
        FROM primary_email pe
        FULL OUTER JOIN (
          SELECT user_main_id, contact_secondary_email 
          FROM stitched_contact_emails 
          WHERE rn = 1
        ) sce ON pe.user_main_id = sce.user_main_id
        FULL OUTER JOIN (
          SELECT user_main_id, stitched_email 
          FROM stitcher_email 
          WHERE rn = 1
        ) se ON COALESCE(pe.user_main_id, sce.user_main_id) = se.user_main_id
        WHERE COALESCE(
          pe.contact_primary_email,
          sce.contact_secondary_email,
          se.stitched_email
        ) IS NOT NULL
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  - name: language_preference_filled
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , all_users AS (
          SELECT DISTINCT user_main_id
          FROM {{ this.DeRef("models/user_id_stitcher") }}
        ),
        langs AS (
          SELECT
            user_main_id,
            CASE
              WHEN UPPER(languagepref) LIKE 'EN%' OR UPPER(languagepref) IN ('US','UK','ENG') THEN 'en'
              WHEN UPPER(languagepref) LIKE 'FR%'                                               THEN 'fr'
              ELSE 'en'
            END AS languagepref
          FROM {{ this.DeRef("models/contact_retail_primary_filtered") }}
        )
        SELECT
          au.user_main_id,
          COALESCE(l.languagepref,'en') AS languagepref
        FROM all_users au
        LEFT JOIN langs l
          ON au.user_main_id = l.user_main_id
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

