models:
  - name: contact_with_retail
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_customer_mapping AS (
          -- Get all customer IDs associated with each stitched user
          SELECT 
            user_main_id,
            other_id AS customerid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'user_id'
        ),
        user_contact_details AS (
          SELECT 
            ucm.user_main_id,
            c.contactid,
            c.seccodeid,
            c.createdate,
            cr.customerid
          FROM user_customer_mapping ucm
          JOIN sysdba.contact_retail cr ON ucm.customerid = cr.customerid
          JOIN sysdba.contact c ON cr.contactid = c.contactid
          
          WHERE c.seccodeid IN ('F6UJ9A000002', 'F6UJ9A000004','F6UJ9A000017')
        ),
        customer_prioritized AS (
          SELECT 
            user_main_id,
            contactid,
            seccodeid,
            createdate,
            customerid,
            
            -- Window function for mainline_customerid (seccode ending in 02)
            CASE 
              WHEN seccodeid = 'F6UJ9A000002' THEN
                first_value(customerid) OVER (
                  PARTITION BY user_main_id, seccodeid
                  
                  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
                )
            END as mainline_customerid,
            -- Window function for outlet_customerid (seccode ending in 04)
            CASE 
              WHEN seccodeid = 'F6UJ9A000004' THEN
                first_value(customerid) OVER (
                  PARTITION BY user_main_id, seccodeid
                  
                  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING
                )
            END as outlet_customerid
          FROM user_contact_details
        )
        SELECT 
          user_main_id,
          contactid,
          seccodeid,
          createdate,
          customerid,
          CAST(mainline_customerid AS STRING) as mainline_customerid,
          CAST(outlet_customerid AS STRING) as outlet_customerid,
          -- Primary customer ID: COALESCE mainline first, then outlet
          CAST(COALESCE(
            MAX(mainline_customerid) OVER (PARTITION BY user_main_id),
            MAX(outlet_customerid) OVER (PARTITION BY user_main_id)
          ) AS STRING) AS primary_customerid
        FROM customer_prioritized
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  # NEW: Contact data filtered by primary_customerid
  - name: contact_primary_filtered
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_primary_contact AS (
          SELECT 
            cwr.user_main_id,
            cwr.primary_customerid,
            cr.contactid as primary_contactid
          FROM {{ this.DeRef("models/contact_with_retail") }} cwr
          JOIN sysdba.contact_retail cr 
            ON cwr.primary_customerid = cr.customerid
        )
        SELECT 
          upc.user_main_id,
          c.contactid,
          c.firstname,
          c.lastname,
          trim(lower(c.email)) as primary_email,
          c.mobile,
          c.homephone,
          c.prefix,
          trim(lower(c.email)) as email,
          CAST(c.createdate AS DATE) AS createdate
        FROM user_primary_contact upc
        JOIN sysdba.contact c ON upc.primary_contactid = c.contactid
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  # NEW: Contact retail data filtered by primary_customerid  
  - name: contact_retail_primary_filtered
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_primary_contact AS (
          SELECT 
            cwr.user_main_id,
            cwr.primary_customerid,
            cr.contactid as primary_contactid
          FROM {{ this.DeRef("models/contact_with_retail") }} cwr
          JOIN sysdba.contact_retail cr 
            ON cwr.primary_customerid = cr.customerid
        )
        SELECT 
          upc.user_main_id,
          cr.contactid,
          cr.customerid,
          cr.identityid,
          CASE
            WHEN UPPER(cr.languagepref) LIKE 'EN%' OR UPPER(cr.languagepref) IN ('US', 'UK', 'ENG')
              THEN 'en'
            WHEN UPPER(cr.languagepref) LIKE 'FR%'
              THEN 'fr'
            ELSE 'en'
          END as languagepref,
          cr.last_transaction_date
        FROM user_primary_contact upc
        JOIN sysdba.contact_retail cr ON upc.primary_contactid = cr.contactid
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  # NEW: Address data filtered by primary_customerid
  - name: address_primary_filtered
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_primary_contact AS (
          SELECT 
            cwr.user_main_id,
            cwr.primary_customerid,
            cr.contactid as primary_contactid
          FROM {{ this.DeRef("models/contact_with_retail") }} cwr
          JOIN sysdba.contact_retail cr 
            ON cwr.primary_customerid = cr.customerid
        )
        SELECT 
          upc.user_main_id,
          a.address1 as address,
          a.city,
          a.state as province,
          a.postalcode,
          a.country
        FROM user_primary_contact upc
        JOIN sysdba.address a ON upc.primary_contactid = a.entityid
        WHERE a.isprimary = 'T'
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  - name: customer_brand_affinity
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_customer_mapping AS (
          -- Get all customer IDs associated with each stitched user
          SELECT 
            user_main_id,
            other_id AS customerid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'user_id'
        ),
        brand_counts AS (
          SELECT 
            ucm.user_main_id,
            UPPER(c.brand_name_eng) as brand_name_eng,
            SUM(NVL(ti.qty, 0)) AS purchased_items
          FROM user_customer_mapping ucm
          JOIN vstore.customer cust ON ucm.customerid = cust.identificationno
          JOIN vstore.transaction t ON cust.pkcustomerno = t.fkcustomerno
          LEFT JOIN vstore.tranitem ti ON ti.fktransactionid = t.pktransactionid
          INNER JOIN vstore.sku s ON s.pksku = ti.fksku
          INNER JOIN elcat.catalog c ON s.fkstyleno = SUBSTR(c.styleid, 1, 8)
          WHERE NVL(ti.qty, 0) > 0 
            AND t.fkTranType IN (10)
            AND COALESCE(t.IsVoided, 'f') = 'f'
            AND t.businessdate > date_sub(current_date(), 365 * 3)
            AND c.brand_name_eng IS NOT NULL
          GROUP BY ucm.user_main_id, UPPER(c.brand_name_eng)
        ),
        ranked_brands AS (
          SELECT
            user_main_id,
            brand_name_eng,
            purchased_items,
            ROW_NUMBER() OVER (PARTITION BY user_main_id ORDER BY purchased_items DESC) AS rn
          FROM brand_counts
        )
        SELECT 
          user_main_id,
          concat_ws('|', collect_list(brand_name_eng)) AS brand_affinity_purchased
        FROM (
          SELECT 
            user_main_id,
            brand_name_eng
          FROM ranked_brands
          WHERE rn <= 10
          ORDER BY user_main_id, purchased_items DESC
        ) 
        GROUP BY user_main_id
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  - name: customer_category_affinity
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_customer_mapping AS (
          -- Get all customer IDs associated with each stitched user
          SELECT 
            user_main_id,
            other_id AS customerid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'user_id'
        ),
        category_counts AS (
          SELECT
            ucm.user_main_id,
            c.catagory_level_2a,
            SUM(NVL(ti.qty, 0)) AS purchased_items
          FROM user_customer_mapping ucm
          JOIN vstore.customer cust ON ucm.customerid = cust.identificationno
          JOIN vstore.transaction t ON cust.pkcustomerno = t.fkcustomerno
          LEFT JOIN vstore.tranitem ti ON ti.fktransactionid = t.pktransactionid
          INNER JOIN vstore.sku s ON s.pksku = ti.fksku
          INNER JOIN elcat.catalog c ON s.fkstyleno = SUBSTR(c.styleid, 1, 8)
          WHERE NVL(ti.qty, 0) > 0
            AND t.fkTranType IN (10)
            AND COALESCE(t.IsVoided, 'f') = 'f'
            AND t.businessdate > date_sub(current_date(), 365 * 3)
            AND c.catagory_level_2a IS NOT NULL
          GROUP BY ucm.user_main_id, c.catagory_level_2a
        ),
        ranked_categories AS (
          SELECT
            user_main_id,
            UPPER(catagory_level_2a) as catagory_level_2a,
            purchased_items,
            ROW_NUMBER() OVER (PARTITION BY user_main_id ORDER BY purchased_items DESC) AS rn
          FROM category_counts
        )
        SELECT
          user_main_id,
          concat_ws('|', collect_list(catagory_level_2a)) AS category_affinity_purchased
        FROM (
          SELECT
            user_main_id,
            catagory_level_2a
          FROM ranked_categories
          WHERE rn <= 10
          ORDER BY user_main_id, purchased_items DESC
        )
        GROUP BY user_main_id
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

  - name: customer_brand_affinity_interested
    model_type: sql_template
    model_spec:
      materialization:
        output_type: table
      single_sql: |
        , user_customer_mapping AS (
          -- Get all customer IDs associated with each stitched user
          SELECT 
            user_main_id,
            other_id AS customerid
          FROM {{ this.DeRef("models/user_id_stitcher") }}
          WHERE other_id_type = 'user_id'
        ),
        browsing_events AS (
          -- Combine product viewed and wishlist events
          SELECT 
            ucm.user_main_id,
            pv.brand_en as brand_name,
            'viewed' as event_type,
            pv.timestamp
          FROM rudderstack.product_viewed pv
          JOIN user_customer_mapping ucm ON pv.user_id = ucm.customerid
          WHERE pv.user_id IS NOT NULL 
            AND pv.brand_en IS NOT NULL 
            AND pv.brand_en != ''
            AND pv.timestamp > date_sub(current_date(), 180)
          
          UNION ALL
          
          SELECT 
            ucm.user_main_id,
            pw.brand_en as brand_name,
            'added_to_wishlist' as event_type,
            pw.timestamp
          FROM rudderstack.product_added_to_wishlist pw
          JOIN user_customer_mapping ucm ON pw.user_id = ucm.customerid
          WHERE pw.user_id IS NOT NULL 
            AND pw.brand_en IS NOT NULL 
            AND pw.brand_en != ''
            AND pw.timestamp > date_sub(current_date(), 180)
        ),
        brand_counts AS (
          SELECT 
            user_main_id,
            UPPER(brand_name) as brand_name,
            COUNT(*) AS interaction_count
          FROM browsing_events
          GROUP BY user_main_id, brand_name
        ),
        ranked_brands AS (
          SELECT
            user_main_id,
            brand_name,
            interaction_count,
            ROW_NUMBER() OVER (PARTITION BY user_main_id ORDER BY interaction_count DESC) AS rn
          FROM brand_counts
        )
        SELECT 
          user_main_id,
          concat_ws('|', collect_list(brand_name)) AS brand_affinity_interested
        FROM (
          SELECT 
            user_main_id,
            brand_name
          FROM ranked_brands
          WHERE rn <= 10
          ORDER BY user_main_id, interaction_count DESC
        ) 
        GROUP BY user_main_id
      ids:
        - select: "user_main_id"
          type: main_id
          entity: user

